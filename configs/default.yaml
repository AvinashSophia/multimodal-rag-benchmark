# Default Benchmark Configuration

# Dataset settings
dataset:
  name: "docvqa"  # Options: hotpotqa, docvqa, gqa
  split: "validation"
  max_samples: 5  # Limit for quick testing, set null for full dataset
  data_dir: "data/"

# Retrieval settings
retrieval:
  text:
    method: "dense_qdrant"  # Options: bm25, dense, dense_qdrant, bm25_elastic
    model_name: "BAAI/bge-large-en-v1.5"  # For dense/dense_qdrant
    top_k: 5
    qdrant:
      path: "pipeline/outputs/qdrant_store"
      collection: "dense_text"
    elasticsearch:
      url: "http://localhost:9200"
      index: "bm25_text"
      username: ""   # optional, for secured clusters
      password: ""   # optional, for secured clusters
      ca_cert: ""    # optional, for HTTPS with custom CA
  image:
    method: "clip"  # Options: clip, clip_qdrant
    model_name: "ViT-B-32"
    top_k: 5
    fusion_alpha: 0.5  # Weight for text→image vs image→image fusion (1.0 = text only, 0.0 = image only)
    qdrant:
      path: "pipeline/outputs/qdrant_store"
      collection: "clip_images"

# Model settings
model:
  name: "gpt"  # Options: gpt, gemini, qwen_vl
  gpt:
    model_id: "gpt-4o"
    max_tokens: 512
    temperature: 0.0
  gemini:
    model_id: "gemini-2.5-pro"
    max_tokens: 512
    temperature: 0.0
  gemini_vertex:
    project_id: "way-back-home-487418"
    location: "us-central1"
    model_id: "gemini-2.5-flash-lite-preview-09-2025"
    max_tokens: 512
    temperature: 0.0
  qwen_vl:
    model_id: "Qwen/Qwen2.5-VL-7B-Instruct"
    max_tokens: 512

# Evaluation settings
evaluation:
  backend: "production"  # Options: custom (fast, no deps), production (ranx + HF evaluate + RAGAS)
  retrieval_metrics: ["recall_at_k", "mrr", "ndcg"]
  answer_metrics: ["exact_match", "f1"]
  grounding_metrics: ["faithfulness", "attribution_accuracy"]
  multimodal_metrics: ["vqa_accuracy", "cross_modal_consistency"]
  recall_k_values: [5]

# Output settings
output:
  dir: "pipeline/outputs"
  log_dir: "pipeline/outputs/logs"
  save_retrieved_context: true
  save_attribution: true

# Run settings
run:
  seed: 42
  batch_size: 16
  num_workers: 4
