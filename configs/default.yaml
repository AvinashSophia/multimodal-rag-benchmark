# Default Benchmark Configuration

# Dataset settings
dataset:
  name: "docvqa"  # Options: hotpotqa, docvqa, gqa
  split: "validation"
  max_samples: 5  # Limit for quick testing, set null for full dataset
  data_dir: "data/"

# Retrieval settings
retrieval:
  text:
    method: "bm25"  # Options: bm25, dense
    model_name: "BAAI/bge-large-en-v1.5"  # For dense retrieval
    top_k: 5
  image:
    method: "clip"  # Options: clip
    model_name: "ViT-B-32"
    top_k: 5

# Model settings
model:
  name: "gpt"  # Options: gpt, gemini, qwen_vl
  gpt:
    model_id: "gpt-4o"
    max_tokens: 512
    temperature: 0.0
  gemini:
    model_id: "gemini-2.0-flash"
    max_tokens: 512
    temperature: 0.0
  qwen_vl:
    model_id: "Qwen/Qwen2.5-VL-7B-Instruct"
    max_tokens: 512

# Evaluation settings
evaluation:
  retrieval_metrics: ["recall_at_k", "mrr", "ndcg"]
  answer_metrics: ["exact_match", "f1"]
  grounding_metrics: ["faithfulness", "attribution_accuracy"]
  multimodal_metrics: ["vqa_accuracy", "cross_modal_consistency"]
  recall_k_values: [5]

# Output settings
output:
  dir: "pipeline/outputs"
  log_dir: "pipeline/outputs/logs"
  save_retrieved_context: true
  save_attribution: true

# Run settings
run:
  seed: 42
  batch_size: 16
  num_workers: 4
